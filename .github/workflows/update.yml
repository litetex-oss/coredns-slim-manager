name: Update repo

on:
# TODO
#  schedule:
#    - cron: '5 5 * * *'
  workflow_dispatch:
    inputs:
      tag:
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      
      - name: Update
        run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            tag=$(curl -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/coredns/coredns/releases/latest \
              | jq -r '.tag_name')
          else
            tag="${{ inputs.tag }}"
          fi

          if curl --fail -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/litetex-oss/coredns-slim/branches/release-$tag > /dev/null; then
            echo "Branch already exists; Aborting"
            exit 0
          fi

          git clone --branch "$tag" https://github.com/coredns/coredns.git

          git config --global user.email "164098849+litetex-oss-bot@users.noreply.github.com"
          git config --global user.name "litetex-oss-bot"
          
          cd coredns
          git switch -c release-$tag

          rm -rf .github
          git commit -a -m "Deleted .github folder"

          rm -rf .circleci
          git commit -a -m "Deleted .circleci folder"

          rm -f owners_generate.go
          sed -i "/owners_generate.go/d" coredns.go
          git commit -a -m "Deleted owners generation script"

          sed -i "/geoip\|grpc_server\|chaos\|route53\|azure\|clouddns\|k8s_external\|kubernetes\|etcd\|grpc\|nomad/d" plugin.cfg
          rm -rf plugin/{geoip,grpc_server,chaos,route53,azure,clouddns,k8s_external,kubernetes,etcd,grpc,nomad}
          git commit -a -m "Deleted unused plugins"

          rm -rf pb
          git commit -a -m "Deleted pb (protobuf)"

          rm -f core/dnsserver/{server_grpc.go,server_grpc_test.go,server_test.go}
          rm -f plugin/{backend.go,backend_lookup.go,backend_lookup_test.go}
          rm -f plugin/trace/trace_test.go
          rm -f test/{etcd_cache_test.go,etcd_test.go,grpc_test.go}
          git commit -a -m "Deleted go files dependening on remove plugins"

          git apply ../remove-bloat-fix-compile.patch
          git commit -a -m "Removed bloat and fix compilation"

          echo "Add blocklist plugin"
          sed -i '/^forward:forward/i blocklist:github.com/relekang/coredns-blocklist' plugin.cfg

          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/.dockerignore \
            > .dockerignore
          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/Dockerfile \
            > Dockerfile
          git add -A
          git commit -a -m "Add Dockerfile"

          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/it/blocklist.txt \
            > it/blocklist.txt
          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/it/Corefile \
            > it/Corefile
          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/it/docker-compose.yml \
            > it/docker-compose.yml
          git add -A
          git commit -a -m "Add integrationtest"

          mkdir -p .github/workflows
          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/coredns-slim/refs/heads/master/.github/workflows/build-and-tag.yml \
            > .github/workflows/build-and-tag.yml
          git add -A
          git commit -a -m "Add workflow"

          git remote add slim https://litetex-oss-bot:${{ secrets.PUSH_PAT }}@github.com/litetex-oss/coredns-slim.git
          git push --set-upstream slim -u release-$tag
